spring:
  application:
    name: inventory

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inventory_db}
    username: ${SPRING_DATASOURCE_USERNAME:stkuser}
    password: ${SPRING_DATASOURCE_PASSWORD:stkpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000 # 24 hours

server:
  port: 8080
  error:
    include-message: always

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  ai:
    master-key: ${AI_MASTER_KEY:4MblI4M0n4tF2e7l3f5x1V8f0GvX9K0+Qm8A2eI2Q6Q=}
    sql:
      max-rows: ${AI_SQL_MAX_ROWS:200}
