name: Docker Build

on:
  pull_request:
    branches: [master]
    paths:
      - 'frontend/Dockerfile'
      - 'backend/Dockerfile'
      - 'docker-compose.yml'
      - 'frontend/package*.json'
      - 'backend/pom.xml'

jobs:
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t stk-frontend:test ./frontend

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t stk-backend:test ./backend
