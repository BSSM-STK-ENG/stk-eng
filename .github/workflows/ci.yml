name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend (TypeScript + Lint + Test + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (Java 17 + Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: inventory_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Test
        run: ./gradlew test --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/inventory_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

      - name: Build
        run: ./gradlew build -x test --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/inventory_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    defaults:
      run:
        working-directory: frontend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: inventory_e2e
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start Backend
        working-directory: backend
        run: |
          ./gradlew bootRun --no-daemon > ../backend-e2e.log 2>&1 &
          echo $! > ../backend-e2e.pid
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/inventory_e2e
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
          AI_MASTER_KEY: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
          SUPER_ADMIN_EMAIL: superadmin@stk.local
          SUPER_ADMIN_PASSWORD: ChangeMe123!
          APP_CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:3000,http://localhost:3000

      - name: Wait for Backend
        run: |
          for i in {1..60}; do
            if [ -f ../backend-e2e.pid ] && ! kill -0 "$(cat ../backend-e2e.pid)" 2>/dev/null; then
              cat ../backend-e2e.log || true
              exit 1
            fi
            status=$(curl -s -o /tmp/e2e-login.json -w "%{http_code}" -X POST http://127.0.0.1:8080/api/auth/login \
              -H 'Content-Type: application/json' \
              -d '{"email":"superadmin@stk.local","password":"ChangeMe123!"}' || true)
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          cat ../backend-e2e.log || true
          exit 1

      - name: Run E2E Tests
        run: npx playwright test
        env:
          PLAYWRIGHT_USE_DEV_SERVER: 'true'
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          E2E_SUPER_ADMIN_EMAIL: superadmin@stk.local
          E2E_SUPER_ADMIN_PASSWORD: ChangeMe123!

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: backend-e2e-log
          path: backend-e2e.log
          retention-days: 7
