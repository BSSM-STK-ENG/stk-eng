name: Code Review (CodeAgora)

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: LLM Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CodeAgora
        run: npm install -g codeagora

      - name: Initialize CodeAgora
        run: agora init

      - name: Run Review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git diff "origin/$BASE_REF"...HEAD | agora review --output review-result.md

      - name: Post Review Comment
        if: always() && hashFiles('review-result.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "## CodeAgora Review"
            echo ""
            cat review-result.md
          } > comment.md
          gh pr comment "$PR_NUMBER" --body-file comment.md
